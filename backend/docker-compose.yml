version: "3.8"

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  ops-pilot:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: ops-pilot
    ports:
      - "3001:3001"
    volumes:
      - ops_pilot_data:/app/data
    environment:
      - DATABASE_URL=sqlite:///app/data/ops-pilot.db
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET required — generate: openssl rand -hex 32}
      - OPSPILOT_MASTER_KEY=${OPSPILOT_MASTER_KEY:?OPSPILOT_MASTER_KEY required — generate: openssl rand -base64 32}
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.openai.com/v1}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o-mini}
      - RUST_LOG=${RUST_LOG:-ops_pilot=info,tower_http=info}
      - TZ=${TZ:-Asia/Shanghai}
      - LISTEN_ADDR=0.0.0.0:3001
      - STATIC_DIR=/app/static
    restart: unless-stopped
    logging: *default-logging
    networks:
      - ops-pilot

  # ── Ollama (optional) ──────────────────────────────────────────────
  # Start with:  docker compose --profile ollama up -d
  # Or set LLM_PROVIDER=ollama, LLM_BASE_URL=http://ollama:11434/v1
  ollama:
    profiles: ["ollama"]
    image: ollama/ollama:latest
    container_name: ops-pilot-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL:-4}
      - OLLAMA_MAX_LOADED_MODELS=${OLLAMA_MAX_LOADED_MODELS:-2}
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "ollama list 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    # Uncomment for GPU support:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    networks:
      - ops-pilot

volumes:
  ops_pilot_data:
    driver: local
  ollama_data:
    driver: local

networks:
  ops-pilot:
    driver: bridge
