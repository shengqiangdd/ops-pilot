ops-pilot-mod-advisor = { path = "../modules/mod-advisor" }
ops-pilot-mod-topo = { path = "../modules/mod-topo" }
ops-pilot-mod-monitor = { path = "../modules/mod-monitor" }
ops-pilot-mod-alert-escalation = { path = "../modules/mod-alert-escalation" }
ops-pilot-mod-fim = { path = "../modules/mod-fim" }
ops-pilot-mod-baseline = { path = "../modules/mod-baseline" }
ops-pilot-mod-runbook = { path = "../modules/mod-runbook" }
ops-pilot-mod-knowledge = { path = "../modules/mod-knowledge" }

[dev-dependencies]
wiremock = "0.6"

