apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ops-pilot.fullname" . }}
  labels:
    {{- include "ops-pilot.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "ops-pilot.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- with .Values.global.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        # Trigger rollout on config changes
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
      labels:
        {{- include "ops-pilot.labels" . | nindent 8 }}
        {{- include "ops-pilot.selectorLabels" . | nindent 8 }}
    spec:
      {{- include "ops-pilot.imagePullSecret" . | nindent 6 }}
      serviceAccountName: {{ include "ops-pilot.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.global.imageRegistry }}{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            {{- range $key, $val := .Values.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
            {{- if .Values.secrets.JWT_SECRET }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "ops-pilot.fullname" . }}
                  key: JWT_SECRET
            {{- end }}
            {{- if .Values.secrets.OPSPILOT_MASTER_KEY }}
            - name: OPSPILOT_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "ops-pilot.fullname" . }}
                  key: OPSPILOT_MASTER_KEY
            {{- end }}
          ports:
            - name: http
              containerPort: 3001
              protocol: TCP
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /app/data
            {{- if .Values.persistence.readOnlyRootFilesystem }}
            - name: tmp
              mountPath: /tmp
            {{- end }}
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "ops-pilot.fullname" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- if .Values.persistence.readOnlyRootFilesystem }}
        - name: tmp
          emptyDir: {}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
