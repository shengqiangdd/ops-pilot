{{- if or .Values.secrets.JWT_SECRET .Values.secrets.OPSPILOT_MASTER_KEY }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ops-pilot.fullname" . }}
  labels:
    {{- include "ops-pilot.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.secrets.JWT_SECRET }}
  JWT_SECRET: {{ .Values.secrets.JWT_SECRET | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.OPSPILOT_MASTER_KEY }}
  OPSPILOT_MASTER_KEY: {{ .Values.secrets.OPSPILOT_MASTER_KEY | b64enc | quote }}
  {{- end }}
{{- end }}
