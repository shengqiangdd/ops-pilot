{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "ops-pilot.fullname" . }}
  labels:
    {{- include "ops-pilot.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "ops-pilot.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    {{- with .Values.networkPolicy.ingress }}
    {{- toYaml . | nindent 4 }}
    {{- else }}
    - from:
        - podSelector:
            matchLabels:
              {{- include "ops-pilot.selectorLabels" $ | nindent 16 }}
      ports:
        - port: 3001
          protocol: TCP
    {{- end }}
  egress:
    {{- with .Values.networkPolicy.egress }}
    {{- toYaml . | nindent 4 }}
    {{- else }}
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 169.254.169.254/32
      ports:
        - port: 443
          protocol: TCP
        - port: 80
          protocol: TCP
    {{- end }}
{{- end }}
