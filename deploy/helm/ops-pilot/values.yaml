# ── OpsPilot Helm Values ─────────────────────────────────────────────────
# Default values for ops-pilot chart.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# ── Global ──────────────────────────────────────────────────────────────
global:
  # Container image registry
  imageRegistry: ""

  # Additional labels applied to all resources
  labels: {}

  # Pod annotations
  podAnnotations: {}

# ── Image ────────────────────────────────────────────────────────────────
image:
  repository: ghcr.io/shengqiangdd/ops-pilot
  tag: "latest"
  pullPolicy: Always

# ── Replicas ─────────────────────────────────────────────────────────────
replicaCount: 1

# ── Service Account ──────────────────────────────────────────────────────
serviceAccount:
  create: true
  name: ""
  annotations: {}

# ── Pod Security Context ────────────────────────────────────────────────
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

# ── Container Security Context ──────────────────────────────────────────
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  capabilities:
    drop:
      - ALL
    add:
      - NET_BIND_SERVICE

# ── Service ──────────────────────────────────────────────────────────────
service:
  type: ClusterIP
  port: 80
  targetPort: 80
  annotations: {}

# ── Ingress ──────────────────────────────────────────────────────────────
ingress:
  enabled: false
  className: ""
  annotations:
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: ops-pilot.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: ops-pilot-tls
      hosts:
        - ops-pilot.example.com

# ── Environment variables ──────────────────────────────────────────────
env:
  JWT_SECRET: ""
  OPSPILOT_MASTER_KEY: ""
  DATABASE_URL: "sqlite:///app/data/ops-pilot.db"
  LLM_PROVIDER: ""
  LLM_BASE_URL: ""
  LLM_API_KEY: ""
  LLM_MODEL: "gpt-4o"
  LISTEN_ADDR: "0.0.0.0:3001"
  RUST_LOG: "ops_pilot=info,tower_http=info"
  TZ: "UTC"

# ── Secrets (alternative to env for sensitive values) ──────────────────
secrets:
  JWT_SECRET: ""
  OPSPILOT_MASTER_KEY: ""

# ── Persistence ──────────────────────────────────────────────────────────
persistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 1Gi
  annotations: {}
  # existingClaim: ""

# ── Resources ────────────────────────────────────────────────────────────
resources:
  limits:
    cpu: 1
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

# ── Probes ───────────────────────────────────────────────────────────────
livenessProbe:
  httpGet:
    path: /api/v1/health
    port: 3001
  initialDelaySeconds: 30
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /api/v1/health
    port: 3001
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 2

startupProbe:
  httpGet:
    path: /api/v1/health
    port: 3001
  initialDelaySeconds: 5
  periodSeconds: 5
  failureThreshold: 30

# ── Node Selector ────────────────────────────────────────────────────────
nodeSelector: {}

# ── Tolerations ─────────────────────────────────────────────────────────
tolerations: []

# ── Affinity ─────────────────────────────────────────────────────────────
affinity: {}

# ── Pod Disruption Budget ────────────────────────────────────────────────
podDisruptionBudget:
  enabled: false
  minAvailable: 1

# ── Horizontal Pod Autoscaler ──────────────────────────────────────────
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

# ── Network Policy ─────────────────────────────────────────────────────
networkPolicy:
  enabled: false
  ingress: []
  egress: []

# ── ServiceMonitor (Prometheus Operator) ───────────────────────────────
serviceMonitor:
  enabled: false
  interval: 15s
  scrapeTimeout: 10s
  labels: {}
