# ── docker-compose.ghcr.yml ──────────────────────────────────────────────
# Override docker-compose.yml to pull pre-built images from GHCR instead of
# building locally. Usage:
#
#   export TAG=0.1.0
#   docker compose -f docker-compose.yml -f docker-compose.ghcr.yml up -d
# ──────────────────────────────────────────────────────────────────────────

services:
  ops-pilot:
    build: !reset null
    image: ghcr.io/shengqiangdd/ops-pilot:${TAG:-latest}
