# ── OpsPilot CI/CD Pipeline ──────────────────────────────────────────────
name: CI/CD

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  CARGO_TERM_COLOR: always
  RUST_LOG: warn
  NODE_VERSION: '20'
  RUST_TOOLCHAIN: 'stable'

jobs:
  # ═══════════════════════════════════════════════════════════════════════
  # Frontend: lint → type-check → test → e2e → build
  # ═══════════════════════════════════════════════════════════════════════
  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci --ignore-scripts
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test -- --run
      - run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        continue-on-error: true

      - name: Run E2E tests
        run: npx playwright test --reporter=list
        continue-on-error: true
        env:
          CI: true

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  # ═══════════════════════════════════════════════════════════════════════
  # Rust: check → test → clippy → bench → build
  # ═══════════════════════════════════════════════════════════════════════
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: backend
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          cache: always
          components: clippy, rustfmt

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo check
        run: cargo check --workspace --all-targets

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo audit (security advisory check)
        run: |
          cargo install cargo-audit --locked
          cargo audit
        if: matrix.os == 'ubuntu-latest'
        continue-on-error: true

      - name: cargo test
        run: cargo test --workspace --all-targets

      - name: cargo bench (alert_bench)
        run: cargo bench -p ops-pilot-core --bench alert_bench -- --quick
        if: github.event_name == 'push' || contains(github.event.head_commit.modified, 'benches/')
        continue-on-error: true

      - name: cargo build --release
        run: cargo build --release --bin ops-pilot-gateway
        if: matrix.os == 'ubuntu-latest'

      - name: Lint Helm Chart
        run: helm lint deploy/helm/ops-pilot
        if: matrix.os == 'ubuntu-latest'

      - uses: actions/upload-artifact@v4
        with:
          name: ops-pilot-bin-${{ matrix.os }}
          path: backend/target/release/ops-pilot-gateway
          retention-days: 1
        if: matrix.os == 'ubuntu-latest'

  # ═══════════════════════════════════════════════════════════════════════
  # Helm: lint and template validation (runs on every PR/push)
  # ═══════════════════════════════════════════════════════════════════════
  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: 'latest'

      - name: helm lint
        run: helm lint deploy/helm/ops-pilot

      - name: helm template (ensure all templates render)
        run: helm template ops-pilot deploy/helm/ops-pilot

      - name: helm template with sample values
        run: |
          helm template ops-pilot deploy/helm/ops-pilot \
            --set env.JWT_SECRET="ci-test-secret" \
            --set env.OPSPILOT_MASTER_KEY="ci-test-key" \
            --set ingress.enabled=true \
            --set autoscaling.enabled=true \
            --set persistence.enabled=true

  # ═══════════════════════════════════════════════════════════════════════
  # Docker image (tagged releases, or main after tests pass)
  # ═══════════════════════════════════════════════════════════════════════
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [frontend, rust]
    if: github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main')

    steps:
      - uses: actions/checkout@v4

      - name: Set Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ═══════════════════════════════════════════════════════════════════════
  # Helm Chart Release (tagged releases only)
  # ═══════════════════════════════════════════════════════════════════════
  helm-release:
    name: Helm Chart Release
    runs-on: ubuntu-latest
    needs: [frontend, rust]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Package Helm Chart
        run: |
          mkdir -p helm-charts
          helm package deploy/helm/ops-pilot -d helm-charts/

      - name: Upload Helm Chart Artifact
        uses: actions/upload-artifact@v4
        with:
          name: helm-chart
          path: helm-charts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: helm-charts/*
          generate_release_notes: true

  # ═══════════════════════════════════════════════════════════════════════
  # Summary badge
  # ═══════════════════════════════════════════════════════════════════════
  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [frontend, rust, helm-lint, docker, helm-release]
    if: always()

    steps:
      - run: |
          echo '## ✅ CI/CD Pipeline Results' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo '| Job | Status |' >> $GITHUB_STEP_SUMMARY
          echo '|-----|--------|' >> $GITHUB_STEP_SUMMARY
          echo '| Frontend   | ${{ needs.frontend.result }} |' >> $GITHUB_STEP_SUMMARY
          echo '| Rust       | ${{ needs.rust.result }} |' >> $GITHUB_STEP_SUMMARY
          echo '| Helm Lint  | ${{ needs.helm-lint.result }} |' >> $GITHUB_STEP_SUMMARY
          echo '| Docker     | ${{ needs.docker.result }} |' >> $GITHUB_STEP_SUMMARY
          echo '| Helm Chart | ${{ needs.helm-release.result }} |' >> $GITHUB_STEP_SUMMARY
